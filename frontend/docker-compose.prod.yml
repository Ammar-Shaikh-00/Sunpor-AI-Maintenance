# Production frontend
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Override API URL: VITE_API_URL=http://your-server:8000 docker compose -f docker-compose.prod.yml up -d --build

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://100.93.158.60:8000}
    container_name: sunpor-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - sunporNet

networks:
  sunporNet:
    external: true
